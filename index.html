<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colapso 2099 - Edición Realtime</title>
    <link rel="stylesheet" href="index.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<h1>🌍 COLAPSO 2099</h1>

<div id="authScreen" class="auth-container">
    <h2>Selecciona tu Rol de Ingreso</h2>
    <div class="auth-buttons">
        <button onclick="accessAsAdmin()" style="background: #00ecff; color: #111;">👁️ Entrar como Administrador</button>
        <button onclick="accessAsOrg()" style="background: #00aa66; color: white;">🚀 Entrar como Organización</button>
    </div>
</div>

<div id="gameScreen" class="container" style="display: none;">
    
    <div class="panel" id="adminPanel">
        <h2>Panel de Control</h2>
        <div style="margin-top:20px; display: flex; justify-content: space-between; align-items: center;">
            <h3>Ronda: <span id="round" style="color:#00ecff;">0</span> / 5</h3>
            <h3>Estabilidad: <span id="stability">10</span>/10</h3>
        </div>

        <div id="ranking"></div>

        <div id="adminControls" style="display: none;">
            <button class="btn-process" onclick="nextRound()">Procesar Ronda Actual</button>
            <button onclick="startGame()" style="width:100%; background:#333; color:#aaa; margin-top:10px;">Iniciar Partida</button>
            <button class="btn-danger" onclick="manualReset()">Reiniciar Todo (Borrar de Firebase)</button>
        </div>
        <button onclick="logout()" style="width:100%; background:#444; color:white; margin-top:15px;">⬅️ Salir al Menú</button>
    </div>

    <div class="panel" id="orgPanel">
        <h2>Terminal de Decisiones</h2>
        <p>Organización activa: <strong id="currentOrgLabel" style="color: #00ff99;">---</strong></p>

        <div id="orgActions" style="display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn-cooperate" onclick="sendDecision('cooperate')">🟢 COOPERAR (+$ Pozo, +5 Chatarra, +5 Reputacion)</button>
            <button class="btn-betray" onclick="sendDecision('betray')">🔴 TRAICIONAR (-2 Estabilidad, +20 Riqueza, +20 Chatarra)</button>
            <button class="btn-repair" onclick="sendDecision('repair')">🔧 REPARAR (+1 Estabilidad, -5 Chatarra, +7 Reputacion)</button>
        </div>

        <p id="status" class="status-msg"></p>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
